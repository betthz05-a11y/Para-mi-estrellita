<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi estrellita ✨</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    background: radial-gradient(circle at bottom, #1b2735, #090a0f);
}

/* CONTENEDOR */
.contenido {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* TEXTO */
h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.texto {
    font-size: 20px;
    max-width: 500px;
    margin: 15px;
    line-height: 1.5;
}

/* ❤️ CORAZÓN PRO */
.corazon {
    position: relative;
    width: 120px;
    height: 120px;
    background: linear-gradient(45deg, #ff0000, #ff4d6d);
    transform: rotate(-45deg);
    margin: 30px 0;
    animation: latido 1.2s infinite;
    box-shadow: 0 0 25px rgba(255,0,0,0.7);
}

.corazon::before,
.corazon::after {
    content: "";
    position: absolute;
    width: 120px;
    height: 120px;
    background: inherit;
    border-radius: 50%;
}

.corazon::before {
    top: -60px;
    left: 0;
}

.corazon::after {
    left: 60px;
    top: 0;
}

@keyframes latido {
    0%,100% { transform: scale(1) rotate(-45deg); }
    50% { transform: scale(1.15) rotate(-45deg); }
}

/* CONTADOR */
.timer {
    font-size: 22px;
    margin-top: 10px;
    font-weight: bold;
}

/* ✨ CANVAS */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
}

/* RESPONSIVE */
@media(max-width: 500px){
    h1 { font-size: 26px; }
    .texto { font-size: 18px; }
    .corazon { width: 90px; height: 90px; }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="contenido">
    <h1>Para mi estrellita ✨</h1>

    <div class="texto">
        Si pudiera elegir un lugar seguro, sería a tu lado.<br>
        Cuanto más tiempo estoy contigo más te amo.
    </div>

    <div class="corazon"></div>

    <div class="timer" id="contador"></div>
</div>

<script>
// 📅 FECHA
const fechaInicio = new Date("2026-02-27T00:00:00");

// ⏱️ CONTADOR
function actualizarContador() {
    const ahora = new Date();
    let diff = ahora - fechaInicio;

    let segundos = Math.floor(diff / 1000);
    let minutos = Math.floor(segundos / 60);
    let horas = Math.floor(minutos / 60);
    let dias = Math.floor(horas / 24);

    horas %= 24;
    minutos %= 60;
    segundos %= 60;

    document.getElementById("contador").innerHTML =
        `Mi amor por ti comenzó hace...<br>
        ${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos 💖`;
}

setInterval(actualizarContador, 1000);

// ✨ ESTRELLAS PRO
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let estrellas = [];

for (let i = 0; i < 150; i++) {
    estrellas.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5,
        d: Math.random() * 0.5,
        alpha: Math.random()
    });
}

function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < estrellas.length; i++) {
        let s = estrellas[i];

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();

        s.y += s.d;

        if (s.y > canvas.height) {
            s.y = 0;
            s.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(dibujar);
}

dibujar();
</script>

</body>
</html>
